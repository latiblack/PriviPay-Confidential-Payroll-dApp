[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]

[profile.ci]
verifier = "etherscan"
etherscan = { chain = 534351 }

[rpc_endpoints]
zamaSepolia = "https://rpc.sepolia.zama.xyz"
